version: 2

project_name: ponto

before:
  hooks:
    - go mod tidy

builds:
  - id: ponto
    main: ./cmd/ponto
    binary: ponto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids: [ponto]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - MIT-LICENSE
      - README.md
      - completions/*
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive
    cmd: syft

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - --yes
      - --new-bundle-format=true
      - --bundle=${signature}
      - ${artifact}

notarize:
  macos:
    - enabled: true
      ids: [ponto]
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

changelog:
  use: github-native

release:
  prerelease: auto
  # Keep prerelease tags out of GitHub's latest release/install-script path.
  make_latest: "{{ if .Prerelease }}false{{ else }}auto{{ end }}"

homebrew_casks:
  - name: ponto
    ids: [default]
    # Do not update the normal tap for prerelease tags.
    skip_upload: auto
    repository:
      owner: alextakitani
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/alextakitani/ponto-cli"
    description: "CLI for Ponto"
    license: "MIT"
    completions:
      bash: "completions/ponto.bash"
      zsh: "completions/ponto.zsh"
      fish: "completions/ponto.fish"

scoops:
  - name: ponto
    ids: [default]
    # Do not update the normal bucket manifest for prerelease tags.
    skip_upload: auto
    repository:
      owner: alextakitani
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/alextakitani/ponto-cli"
    description: "CLI for Ponto"
    license: MIT

nfpms:
  - id: packages
    package_name: ponto-cli
    ids: [ponto]
    vendor: "Alex Takitani"
    homepage: "https://github.com/alextakitani/ponto-cli"
    maintainer: "Alex Takitani"
    description: "CLI for Ponto"
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: completions/ponto.bash
        dst: /usr/share/bash-completion/completions/ponto
      - src: completions/ponto.zsh
        dst: /usr/share/zsh/vendor-completions/_ponto
      - src: completions/ponto.fish
        dst: /usr/share/fish/vendor_completions.d/ponto.fish
